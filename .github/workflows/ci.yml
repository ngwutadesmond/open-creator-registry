name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run test:openapi
      - run: npm run db:reset:local
      - run: npm run db:validate
      - run: npm run cloudflare:config:gate-a
      - run: npm run cloudflare:seed:render
      - run: npm run build
      - run: npm audit --omit=dev

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: cp apps/admin/.dev.vars.example apps/admin/.dev.vars
      - run: printf '\nWIKIDATA_FIXTURE_MODE=enabled\n' >> apps/admin/.dev.vars
      - run: npm run test:e2e
