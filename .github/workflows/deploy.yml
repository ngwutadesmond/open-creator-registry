name: Manual Cloudflare deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy staging first; production requires accepted staging.
        required: true
        type: choice
        options:
          - staging
          - production
      target:
        description: Deploy exactly one Worker.
        required: true
        type: choice
        options:
          - public
          - admin
      phase:
        description: Public requires deploy; admin bootstrap remains default-deny and final requires Access.
        required: true
        type: choice
        options:
          - deploy
          - bootstrap
          - final
      confirmation:
        description: Enter deploy-ENVIRONMENT-TARGET-PHASE exactly.
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      ${{
        inputs.confirmation == format('deploy-{0}-{1}-{2}', inputs.environment, inputs.target, inputs.phase) &&
        ((inputs.target == 'public' && inputs.phase == 'deploy') ||
         (inputs.target == 'admin' && inputs.phase != 'deploy'))
      }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run cloudflare:config:${{ inputs.environment }}
      - name: Materialize one protected deployment configuration
        run: >-
          npm run cloudflare:config:materialize --
          --environment ${{ inputs.environment }}
          --target ${{ inputs.target }}
          --phase ${{ inputs.phase }}
        env:
          OCR_D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          OCR_ACCOUNT_SUBDOMAIN: ${{ vars.ACCOUNT_SUBDOMAIN }}
          OCR_ACCESS_TEAM_NAME: ${{ vars.CLOUDFLARE_ACCESS_TEAM_NAME }}
          OCR_ACCESS_AUD: ${{ secrets.CLOUDFLARE_ACCESS_AUD }}
          OCR_PROJECT_CONTACT_URL: ${{ vars.PROJECT_CONTACT_URL }}
          OCR_ADMIN_ALLOWED_EMAILS_CONFIGURED: ${{ secrets.ADMIN_ALLOWED_EMAILS != '' }}
          OCR_ADMIN_ROLE_MAPPINGS_CONFIGURED: ${{ secrets.ADMIN_ROLE_MAPPINGS != '' }}
      - name: Validate and deploy exactly one Worker
        run: >-
          node scripts/cloudflare/deploy.mjs
          --application ${{ inputs.target }}
          --environment ${{ inputs.environment }}
          --phase ${{ inputs.phase }}
        env:
          OCR_ADMIN_ALLOWED_EMAILS_CONFIGURED: ${{ secrets.ADMIN_ALLOWED_EMAILS != '' }}
          OCR_ADMIN_ROLE_MAPPINGS_CONFIGURED: ${{ secrets.ADMIN_ROLE_MAPPINGS != '' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

# D1 migrations are intentionally absent. Run the guarded remote D1 command separately,
# record its recovery reference, and verify the schema before invoking this workflow.
